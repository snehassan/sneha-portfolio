<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1a16"/>
      <stop offset="100%" style="stop-color:#141f22"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bg)"/>

  <!-- recovery ring -->
  <circle cx="196" cy="180" r="62" fill="none" stroke="#1f3a33" stroke-width="14"/>
  <circle cx="196" cy="180" r="62" fill="none" stroke="#34d399" stroke-width="14"
          stroke-linecap="round" stroke-dasharray="268 390" transform="rotate(-90 196 180)"/>
  <text x="196" y="174" text-anchor="middle" fill="#34d399" font-family="system-ui, sans-serif" font-size="30" font-weight="600">69%</text>
  <text x="196" y="198" text-anchor="middle" fill="#5c7a72" font-family="system-ui, sans-serif" font-size="12" letter-spacing="1">RECOVERY</text>

  <!-- schedule blocks -->
  <rect x="330" y="104" width="300" height="26" rx="4" fill="#34d399" opacity="0.32"/>
  <rect x="330" y="144" width="238" height="26" rx="4" fill="#34d399" opacity="0.22"/>
  <rect x="330" y="184" width="286" height="26" rx="4" fill="#fbbf24" opacity="0.26"/>
  <rect x="330" y="224" width="196" height="26" rx="4" fill="#38bdf8" opacity="0.24"/>
  <rect x="330" y="264" width="252" height="26" rx="4" fill="#38bdf8" opacity="0.16"/>

  <!-- timeline rail -->
  <rect x="312" y="104" width="3" height="186" rx="1.5" fill="#254740"/>
  <circle cx="313.5" cy="117" r="5" fill="#34d399"/>
  <circle cx="313.5" cy="197" r="5" fill="#fbbf24"/>
  <circle cx="313.5" cy="277" r="5" fill="#38bdf8"/>

  <text x="400" y="360" text-anchor="middle" fill="#8fe3c4" font-family="system-ui, sans-serif" font-size="28" font-weight="600">Daily OS</text>
  <text x="400" y="395" text-anchor="middle" fill="#6b8a82" font-family="system-ui, sans-serif" font-size="14">Recovery-Aware Scheduling, Driven by Whoop Data</text>
</svg>
